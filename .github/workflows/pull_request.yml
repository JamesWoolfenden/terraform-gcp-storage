---
name: Pull Request
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  pr:
    uses: JamesWoolfenden/.github/.github/workflows/terraform-pr-gcp.yml@main
    with:
      service_account: terraform-gcp-storage@pike-477416.iam.gserviceaccount.com
